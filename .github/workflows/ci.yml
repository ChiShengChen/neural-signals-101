name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEURO101_SMOKE: "1"          # smallest data slices so notebooks run fast
      NEURO101_DATA: ${{ github.workspace }}/.neuro101_data
      MPLBACKEND: Agg
      PYTHONWARNINGS: ignore

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip wheels.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      # Cache downloaded datasets between runs (BCI IV 2a, PhysioNet, Sleep-EDF).
      - name: Cache datasets
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.neuro101_data
            ~/mne_data
          key: neuro101-data-v1

      - name: Install (CPU-only torch + pinned deps + package)
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install torch==2.4.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -e .

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Unit tests (no downloads)
        run: pytest -q -m "not network and not slow"

      - name: Build notebooks from sources
        run: python scripts/build_notebooks.py

      - name: Notebook smoke test (executes every notebook, smaller data)
        run: pytest -q -m "slow or network" tests/test_notebooks_smoke.py
